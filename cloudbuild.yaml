steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/task-book-web:$SHORT_SHA
      - -t
      - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/task-book-web:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/task-book-web:$SHORT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/task-book-web:latest

images:
  - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/task-book-web:$SHORT_SHA
  - asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/task-book-web:latest

options:
  logging: CLOUD_LOGGING_ONLY
